databases:
  - name: bolao-copa-2026-db
    databaseName: bolao_copa_2026
    user: bolao_user

services:
  - type: web
    name: bolao-copa-2026-api
    runtime: docker
    rootDir: backend/BolaoCopa.Api
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bolao-copa-2026-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://seu-frontend-aqui.com
      - key: AUTO_CREATE_DATABASE
        value: true
